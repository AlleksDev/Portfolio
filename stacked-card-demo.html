<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Card Image - Efecto Hover 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .demo-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 60px;
      max-width: 1200px;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .demo-section h2 {
      color: #e15a1a;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .demo-section p {
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ====== CARD CONTAINER STYLES ====== */
    .card-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4/5;
      perspective: 1200px;
    }

    .main-image {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      z-index: 10;
      transition: all 0.3s ease-out;
    }

    .card-container:hover .main-image {
      transform: rotateZ(-5deg) scale(1.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .stacked-card {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      border: 2px solid #e15a1a;
      background: linear-gradient(135deg, rgba(225, 90, 26, 0.1), rgba(225, 90, 26, 0.05));
      transition: all 0.3s ease-out;
    }

    .stacked-card-1 {
      z-index: 9;
      transform: translateX(0) translateY(0) rotateZ(0deg);
    }

    .card-container:hover .stacked-card-1 {
      transform: translateX(12px) translateY(8px) rotateZ(5deg);
    }

    .stacked-card-2 {
      z-index: 8;
      transform: translateX(0) translateY(0) rotateZ(0deg);
    }

    .card-container:hover .stacked-card-2 {
      transform: translateX(24px) translateY(16px) rotateZ(10deg);
    }

    .stacked-card-3 {
      z-index: 7;
      transform: translateX(0) translateY(0) rotateZ(0deg);
    }

    .card-container:hover .stacked-card-3 {
      transform: translateX(36px) translateY(24px) rotateZ(15deg);
    }

    .card-container::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: radial-gradient(ellipse at 30% 30%, transparent 0%, rgba(0, 0, 0, 0.15) 100%);
      z-index: 0;
      pointer-events: none;
      transition: all 0.3s ease-out;
    }

    .card-container:hover::before {
      background: radial-gradient(ellipse at 30% 30%, transparent 0%, rgba(0, 0, 0, 0.25) 100%);
    }

    /* Imagen de placeholder */
    .placeholder-img {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
    }

    @media (max-width: 768px) {
      .demo-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-section">
      <h2>📸 Card con Imagen Real</h2>
      <p>Pasa el ratón para ver el efecto 3D. La imagen rota y las tarjetas se desbancan como documentos desordenados.</p>
      <div class="card-container">
        <div class="stacked-card stacked-card-1"></div>
        <div class="stacked-card stacked-card-2"></div>
        <div class="stacked-card stacked-card-3"></div>
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=500&fit=crop" alt="Profile" class="main-image">
      </div>
    </div>

    <div class="demo-section">
      <h2>🎨 Card con Placeholder</h2>
      <p>Mismo efecto con un div placeholder. Útil para prototipos o cuando no tienes imagen aún.</p>
      <div class="card-container">
        <div class="stacked-card stacked-card-1"></div>
        <div class="stacked-card stacked-card-2"></div>
        <div class="stacked-card stacked-card-3"></div>
        <div class="main-image placeholder-img">
          👤
        </div>
      </div>
    </div>
  </div>
</body>
</html>
